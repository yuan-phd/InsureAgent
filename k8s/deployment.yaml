apiVersion: apps/v1
kind: Deployment
metadata:
  name: insureagent
  labels:
    app: insureagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insureagent
  template:
    metadata:
      labels:
        app: insureagent
    spec:
      containers:
        - name: insureagent
          image: insureagent-kube:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20