version: "3.9"

services:

  api:
    build: .
    container_name: insureagent-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./insurance.db:/app/insurance.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.0
    container_name: insureagent-mlflow
    ports:
      - "5001:5001"
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5001
      --backend-store-uri /mlflow/mlruns
    restart: unless-stopped